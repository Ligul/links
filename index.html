<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ligul - Социальные сети</title>
        <link
            href="https://bootswatch.com/5/lux/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn-uicons.flaticon.com/2.6.0/uicons-brands/css/uicons-brands.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-straight/css/uicons-bold-straight.css"
        />
        <style>
            body {
                background-color: #f8f9fa;
            }
            .profile-section {
                text-align: center;
                padding: 2rem 0;
            }
            .profile-img {
                width: 150px;
                height: 150px;
                margin-bottom: 1rem;
            }
            .links-container {
                max-width: 600px;
                margin: 0 auto;
                padding: 0 1rem;
            }
            .link-card {
                transition: transform 0.2s;
                margin-bottom: 1rem;
            }
            .link-card:hover {
                transform: translateY(-2px);
            }
            .category-title {
                margin: 2rem 0 1rem;
                color: #495057;
            }
            .link-icon {
                margin-right: 0.5rem;
                font-size: 1.2rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="profile-section">
                <img src="logo.png" alt="Ligul Logo" class="profile-img" />
                <h1 class="mb-4">Ligul</h1>
            </div>

            <div class="links-container">
                <div class="category">
                    <h3 class="category-title">Основные платформы</h3>
                    <a
                        href="https://www.youtube.com/@Ligul"
                        target="_blank"
                        class="card link-card text-decoration-none"
                    >
                        <div
                            class="card-body d-flex align-items-center text-primary"
                        >
                            <i class="fi fi-brands-youtube link-icon"></i>
                            <span class="text-dark">YouTube</span>
                        </div>
                    </a>
                    <a
                        href="https://t.me/ligul_games"
                        target="_blank"
                        class="card link-card text-decoration-none"
                    >
                        <div class="card-body d-flex align-items-center">
                            <i
                                class="fi fi-brands-telegram link-icon text-primary"
                            ></i>
                            <span class="text-dark">Telegram канал</span>
                        </div>
                    </a>
                </div>

                <div class="category">
                    <h3 class="category-title">Контакты</h3>
                    <a
                        href="https://t.me/Ligul3D"
                        target="_blank"
                        class="card link-card text-decoration-none"
                    >
                        <div class="card-body d-flex align-items-center">
                            <i
                                class="fi fi-brands-telegram link-icon text-primary"
                            ></i>
                            <span class="text-dark">Telegram</span>
                        </div>
                    </a>
                    <a
                        href="https://discordapp.com/users/178823874354479104/"
                        target="_blank"
                        class="card link-card text-decoration-none"
                        data-bs-toggle="modal"
                        data-bs-target="#discordModal"
                        hidden
                    >
                        <div class="card-body d-flex align-items-center">
                            <i
                                class="fi fi-brands-discord link-icon text-primary"
                            ></i>
                            <span class="text-dark">Discord</span>
                        </div>
                    </a>
                    <a
                        href="mailto:ligul3d@mail.ru"
                        class="card link-card text-decoration-none"
                        data-bs-toggle="modal"
                        data-bs-target="#mailModal"
                    >
                        <div class="card-body d-flex align-items-center">
                            <i class="fi fi-bs-at link-icon text-dark"></i>
                            <span class="text-dark">Email</span>
                        </div>
                    </a>
                </div>

                <div class="category">
                    <h3 class="category-title">Другое</h3>
                    <a
                        href="https://github.com/Ligul"
                        target="_blank"
                        class="card link-card text-decoration-none"
                    >
                        <div class="card-body d-flex align-items-center">
                            <i
                                class="fi fi-brands-github link-icon text-dark"
                            ></i>
                            <span class="text-dark">GitHub</span>
                        </div>
                    </a>
                </div>

                <div class="category" hidden>
                    <h3 class="category-title">Поддержать</h3>
                    <a
                        href="https://patreon.com/Ligul"
                        target="_blank"
                        class="card link-card text-decoration-none"
                    >
                        <div class="card-body d-flex align-items-center">
                            <i
                                class="fi fi-brands-patreon link-icon text-primary"
                            ></i>
                            <span class="text-dark">Patreon</span>
                        </div>
                    </a>
                    <a
                        href="https://boosty.to/ligul"
                        target="_blank"
                        class="card link-card text-decoration-none"
                    >
                        <div class="card-body d-flex align-items-center">
                            <!-- <i class="link-icon">🚀</i> -->
                            <img
                                src="https://boosty.to/favicon.png?v=12"
                                alt="🚀"
                                class="link-icon"
                                style="
                                    width: 1.2rem;
                                    height: 1.2rem;
                                    margin-right: 0.5rem;
                                    filter: grayscale(1) brightness(0.8)
                                        contrast(2.5);
                                "
                            />
                            <span class="text-dark">Boosty</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- Discord Modal -->
        <div class="modal fade" id="discordModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Discord</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <p>
                            <!-- Я редко использую Discord, если вам удобно, то лучше пишите в Telegram
                            <hr /> -->
                            Если ссылка не сработала, найдите меня по юзернейму:
                        </p>
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control"
                                value="ligul3d"
                                id="discordUsername"
                                readonly
                            />
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                onclick="copyDiscordUsername()"
                            >
                                Копировать
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mail Modal -->
        <div class="modal fade" id="mailModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Email</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <p>Вы также можете написать мне вручную:</p>
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control"
                                value="ligul3d@mail.ru"
                                id="mailAddress"
                                readonly
                            />
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                onclick="copyMailAddress()"
                            >
                                Копировать
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function copyDiscordUsername() {
                const username = document.getElementById("discordUsername");
                username.select();
                navigator.clipboard.writeText(username.value);

                const button = username.nextElementSibling;
                const originalText = button.innerText;
                button.innerText = "Скопировано!";
                setTimeout(() => {
                    button.innerText = originalText;
                }, 2000);
            }
            function copyMailAddress() {
                const mail = document.getElementById("mailAddress");
                mail.select();
                navigator.clipboard.writeText(mail.value);

                const button = mail.nextElementSibling;
                const originalText = button.innerText;
                button.innerText = "Скопировано!";
                setTimeout(() => {
                    button.innerText = originalText;
                }, 2000);
            }

            // Открываем ссылки в новой вкладке даже при клике на карточку с модальным окном
            document
                .querySelector('[data-bs-target="#discordModal"]')
                .addEventListener("click", function (e) {
                    e.preventDefault();
                    window.open(this.href, "_blank");
                });
            document
                .querySelector('[data-bs-target="#mailModal"]')
                .addEventListener("click", function (e) {
                    e.preventDefault();
                    window.open(this.href, "_blank");
                });
        </script>
    </body>
</html>
